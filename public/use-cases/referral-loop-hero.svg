<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="680" viewBox="0 0 1040 680" role="img">
  <defs>
    <linearGradient id="rlHeroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b0f" />
      <stop offset="1" stop-color="#1d4a3f" />
    </linearGradient>
    <style>
      .ink { fill: rgba(255,255,255,0.92); font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
      .muted { fill: rgba(255,255,255,0.72); font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
      .stroke { stroke: rgba(255,255,255,0.14); }
      .accent { fill: rgba(124,255,214,0.92); font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
    </style>
  </defs>

  <rect x="0" y="0" width="1040" height="680" rx="26" fill="url(#rlHeroBg)" />
  <rect x="34" y="30" width="972" height="620" rx="24" fill="rgba(255,255,255,0.03)" class="stroke" stroke-width="1" />

  <text class="muted" x="72" y="88" font-size="12" letter-spacing="1.2">USE CASE FLOW</text>
  <text class="ink" x="72" y="132" font-size="34" font-weight="700">Referral Loop</text>
  <text class="muted" x="72" y="162" font-size="14">Positive signal → one ask → route replies (operator-controlled)</text>

  <rect x="72" y="208" width="896" height="230" rx="22" fill="rgba(255,255,255,0.04)" class="stroke" stroke-width="1" />

  <rect x="102" y="252" width="250" height="150" rx="20" fill="rgba(255,255,255,0.05)" class="stroke" stroke-width="1" />
  <text class="accent" x="130" y="286" font-size="11" font-weight="700" letter-spacing="1.2">TRIGGER</text>
  <text class="ink" x="130" y="316" font-size="14" font-weight="700">Positive signal</text>
  <text class="muted" x="130" y="342" font-size="12">Job complete</text>
  <text class="muted" x="130" y="364" font-size="12">“Thanks!” reply</text>

  <rect x="395" y="252" width="250" height="150" rx="20" fill="rgba(255,255,255,0.05)" class="stroke" stroke-width="1" />
  <text class="accent" x="423" y="286" font-size="11" font-weight="700" letter-spacing="1.2">ASK</text>
  <text class="ink" x="423" y="316" font-size="14" font-weight="700">One clean ask</text>
  <text class="muted" x="423" y="342" font-size="12">Quiet hours</text>
  <text class="muted" x="423" y="364" font-size="12">One follow-up max</text>

  <rect x="688" y="252" width="250" height="150" rx="20" fill="rgba(255,255,255,0.05)" class="stroke" stroke-width="1" />
  <text class="accent" x="716" y="286" font-size="11" font-weight="700" letter-spacing="1.2">ROUTE</text>
  <text class="ink" x="716" y="316" font-size="14" font-weight="700">Thank + handoff</text>
  <text class="muted" x="716" y="342" font-size="12">Stop on reply</text>
  <text class="muted" x="716" y="364" font-size="12">Human handles</text>

  <path d="M352 328 H395" fill="none" stroke="rgba(255,255,255,0.26)" stroke-width="4" stroke-linecap="round" />
  <path d="M645 328 H688" fill="none" stroke="rgba(255,255,255,0.26)" stroke-width="4" stroke-linecap="round" />

  <rect x="72" y="462" width="896" height="168" rx="22" fill="rgba(255,255,255,0.04)" class="stroke" stroke-width="1" />
  <text class="ink" x="104" y="506" font-size="14" font-weight="700">Operator guardrails</text>
  <text class="muted" x="104" y="532" font-size="12">Consent-first channel</text>
  <text class="muted" x="104" y="554" font-size="12">No incentives by default</text>
  <text class="muted" x="104" y="576" font-size="12">Stop on reply + escalate</text>

  <text class="muted" x="524" y="532" font-size="12">Quiet hours + caps</text>
  <text class="muted" x="524" y="554" font-size="12">One follow-up max</text>
  <text class="muted" x="524" y="576" font-size="12">Route questions to a human</text>
</svg>

