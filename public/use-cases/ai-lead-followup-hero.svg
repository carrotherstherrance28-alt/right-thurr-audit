<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" role="img" aria-label="Lead capture to AI follow-up to booked calendar handoff">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b0f" />
      <stop offset="1" stop-color="#10162a" />
    </linearGradient>
    <style>
      .ink { fill: rgba(255,255,255,0.92); font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
      .muted { fill: rgba(255,255,255,0.72); font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
      .stroke { stroke: rgba(255,255,255,0.14); }
      .accent { fill: rgba(255,141,48,0.92); font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
    </style>
  </defs>
  <rect x="0" y="0" width="900" height="560" rx="32" fill="url(#bg)" />
  <rect x="28" y="28" width="844" height="504" rx="28" fill="rgba(255,255,255,0.03)" class="stroke" stroke-width="1" />

  <rect x="70" y="90" width="240" height="330" rx="26" fill="rgba(255,255,255,0.04)" class="stroke" stroke-width="1" />
  <text class="accent" x="98" y="142" font-size="12" font-weight="700" letter-spacing="1.2">CAPTURE</text>
  <text class="ink" x="98" y="182" font-size="18" font-weight="700">Inbound lead</text>
  <text class="muted" x="98" y="212" font-size="13">Form • Missed call</text>
  <text class="muted" x="98" y="236" font-size="13">DM • Chat</text>
  <rect x="98" y="268" width="184" height="40" rx="20" fill="rgba(255,255,255,0.08)" class="stroke" stroke-width="1" />
  <text class="ink" x="122" y="294" font-size="12" font-weight="700">Tag + source</text>

  <rect x="330" y="90" width="240" height="330" rx="26" fill="rgba(255,255,255,0.04)" class="stroke" stroke-width="1" />
  <text class="accent" x="358" y="142" font-size="12" font-weight="700" letter-spacing="1.2">FOLLOW UP</text>
  <text class="ink" x="358" y="182" font-size="18" font-weight="700">Operator scripts</text>
  <text class="muted" x="358" y="212" font-size="13">Replies • Reminders</text>
  <text class="muted" x="358" y="236" font-size="13">Escalation rules</text>
  <rect x="358" y="268" width="184" height="40" rx="20" fill="rgba(255,255,255,0.08)" class="stroke" stroke-width="1" />
  <text class="ink" x="382" y="294" font-size="12" font-weight="700">Human takeover</text>

  <rect x="590" y="90" width="240" height="330" rx="26" fill="rgba(255,255,255,0.04)" class="stroke" stroke-width="1" />
  <text class="accent" x="618" y="142" font-size="12" font-weight="700" letter-spacing="1.2">BOOKED</text>
  <text class="ink" x="618" y="182" font-size="18" font-weight="700">Calendar handoff</text>
  <text class="muted" x="618" y="212" font-size="13">Booked • Not a fit</text>
  <text class="muted" x="618" y="236" font-size="13">No response</text>
  <rect x="618" y="268" width="184" height="40" rx="20" fill="rgba(255,255,255,0.08)" class="stroke" stroke-width="1" />
  <text class="ink" x="642" y="294" font-size="12" font-weight="700">Outcome report</text>

  <path d="M 310 260 C 330 260 330 260 350 260" stroke="rgba(255,255,255,0.22)" stroke-width="3" fill="none" />
  <path d="M 570 260 C 590 260 590 260 610 260" stroke="rgba(255,255,255,0.22)" stroke-width="3" fill="none" />

  <text class="muted" x="70" y="470" font-size="12">Educational template — no guarantees; compliance depends on your situation.</text>
