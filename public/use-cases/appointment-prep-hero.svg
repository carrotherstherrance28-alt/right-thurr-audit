    </text>
    <rect x="122" y="356" width="232" height="154" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)" />
    <text x="142" y="392" fill="rgba(255,255,255,0.76)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="13">
      Gate rules
    </text>
    <g fill="rgba(255,255,255,0.64)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="12">
      <text x="142" y="418">Business hours</text>
      <text x="142" y="442">Consent on file</text>
      <text x="142" y="466">Stop if already confirmed</text>
      <text x="142" y="490">Skip if canceled/rescheduled</text>
    </g>
    <text x="122" y="564" fill="rgba(255,255,255,0.64)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="13">
