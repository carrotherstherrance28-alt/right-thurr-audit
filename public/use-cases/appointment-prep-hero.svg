    </text>
    <rect x="526" y="356" width="232" height="202" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)" />
    <g fill="rgba(255,255,255,0.70)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="12">
      <text x="546" y="388">“Quick confirmation for tomorrow</text>
      <text x="546" y="410">at 10:15–11:00.</text>
      <text x="546" y="436">Reply YES to confirm.</text>
      <text x="546" y="462">Gate code / parking notes?</text>
      <text x="546" y="488">Pets on site?”</text>
    </g>
    <text x="526" y="602" fill="rgba(255,255,255,0.64)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="13">
