    <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="12" fill="rgba(255,255,255,0.70)">
      <text x="930" y="332">Confirmed ✓</text>
      <text x="930" y="364">Notes captured</text>
      <text x="930" y="396">Change request → human</text>
      <text x="930" y="428">No reply → 1 follow-up</text>
      <text x="930" y="460">Stop + close</text>
    </g>
    <rect x="930" y="496" width="108" height="96" rx="14" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.10)" />
    <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="12" fill="rgba(255,255,255,0.62)">
      <text x="944" y="528">Stop rules</text>
      <text x="944" y="552">cap 1</text>
      <text x="944" y="576">quiet hours</text>
    </g>
  </g>
