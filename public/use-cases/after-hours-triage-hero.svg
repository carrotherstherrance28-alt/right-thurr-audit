<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" viewBox="0 0 1120 760" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1120" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0B0F" />
      <stop offset="1" stop-color="#101018" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#151522" />
      <stop offset="1" stop-color="#0F0F18" />
    </linearGradient>
  </defs>
  <rect width="1120" height="760" rx="28" fill="url(#bg)" />
  <rect x="52" y="78" width="1016" height="604" rx="22" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.10)" />

  <text x="92" y="152" fill="rgba(255,255,255,0.92)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="24" font-weight="800">
    After-Hours Emergency Triage
  </text>
  <text x="92" y="184" fill="rgba(255,255,255,0.70)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="15">
    After-hours trigger → one calm triage message → safety + schedule/human routing (operator-safe).
  </text>

  <g>
    <rect x="92" y="238" width="292" height="382" rx="18" fill="url(#panel)" stroke="rgba(255,255,255,0.10)" />
    <text x="122" y="290" fill="rgba(255,255,255,0.90)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="16" font-weight="800">
      Trigger
    </text>
    <text x="122" y="322" fill="rgba(255,255,255,0.70)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="14">
      After-hours inbound
    </text>
    <rect x="122" y="356" width="232" height="132" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)" />
    <text x="142" y="392" fill="rgba(255,255,255,0.76)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="13">
      Gate rules
    </text>
    <g fill="rgba(255,255,255,0.64)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="12">
      <text x="142" y="418">Consent on file</text>
      <text x="142" y="442">Quiet-hours policy</text>
      <text x="142" y="466">Stop on reply</text>
    </g>
    <text x="122" y="544" fill="rgba(255,255,255,0.64)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="13">
      One message (no drip)
    </text>

    <rect x="414" y="238" width="292" height="382" rx="18" fill="url(#panel)" stroke="rgba(255,255,255,0.10)" />
    <text x="444" y="290" fill="rgba(255,255,255,0.90)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="16" font-weight="800">
      Message
    </text>
    <text x="444" y="322" fill="rgba(255,255,255,0.70)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="14">
      Calm triage + boundaries
    </text>
    <rect x="444" y="356" width="232" height="154" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)" />
    <g fill="rgba(255,255,255,0.70)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="12">
      <text x="464" y="392">“Are you safe right now?”</text>
      <text x="464" y="416">Emergency → call 911 (or local)</text>
      <text x="464" y="440">Otherwise: share address + issue</text>
      <text x="464" y="464">We’ll offer the next slot</text>
    </g>
    <text x="444" y="564" fill="rgba(255,255,255,0.64)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="13">
      Keep it short
    </text>

    <rect x="736" y="238" width="292" height="382" rx="18" fill="url(#panel)" stroke="rgba(255,255,255,0.10)" />
    <text x="766" y="290" fill="rgba(255,255,255,0.90)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="16" font-weight="800">
      Outcomes
    </text>
    <text x="766" y="322" fill="rgba(255,255,255,0.70)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="14">
      Route to the right lane
    </text>
    <rect x="766" y="356" width="232" height="154" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)" />
    <g fill="rgba(255,255,255,0.70)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="12">
      <text x="786" y="392">Emergency: “call now”</text>
      <text x="786" y="416">High-risk: human escalation</text>
      <text x="786" y="440">Not urgent: schedule next day</text>
      <text x="786" y="464">Stop rules + audit trail</text>
    </g>
    <text x="766" y="564" fill="rgba(255,255,255,0.64)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="13">
      No “DIY safety advice”
    </text>

    <path
      d="M390 428 C402 420 406 420 414 428"
      stroke="rgba(255,255,255,0.18)"
      stroke-width="2"
      fill="none"
    />
    <path
      d="M712 428 C724 420 728 420 736 428"
      stroke="rgba(255,255,255,0.18)"
      stroke-width="2"
      fill="none"
    />
  </g>
</svg>

