<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" role="img" aria-label="Past customers to value offer to booked schedule with guardrails">
  <defs>
    <linearGradient id="bgSeasonalReactivationHero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b0f" />
      <stop offset="1" stop-color="#0e2530" />
    </linearGradient>
    <style>
      .ink { fill: rgba(255,255,255,0.92); font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
      .muted { fill: rgba(255,255,255,0.72); font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
      .stroke { stroke: rgba(255,255,255,0.14); }
      .accent { fill: rgba(65,205,154,0.92); font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
    </style>
  </defs>

  <rect x="0" y="0" width="900" height="560" rx="32" fill="url(#bgSeasonalReactivationHero)" />
  <rect x="28" y="28" width="844" height="504" rx="28" fill="rgba(255,255,255,0.03)" class="stroke" stroke-width="1" />

  <rect x="70" y="90" width="240" height="330" rx="26" fill="rgba(255,255,255,0.04)" class="stroke" stroke-width="1" />
  <text class="accent" x="98" y="142" font-size="12" font-weight="700" letter-spacing="1.2">PAST CUSTOMERS</text>
  <text class="ink" x="98" y="182" font-size="18" font-weight="700">Segmented list</text>
  <text class="muted" x="98" y="212" font-size="13">Last service date</text>
  <text class="muted" x="98" y="236" font-size="13">Stop list applied</text>
  <rect x="98" y="268" width="184" height="40" rx="20" fill="rgba(255,255,255,0.08)" class="stroke" stroke-width="1" />
  <text class="ink" x="122" y="294" font-size="12" font-weight="700">Owner assigned</text>

  <rect x="330" y="90" width="240" height="330" rx="26" fill="rgba(255,255,255,0.04)" class="stroke" stroke-width="1" />
  <text class="accent" x="358" y="142" font-size="12" font-weight="700" letter-spacing="1.2">VALUE OFFER</text>
  <text class="ink" x="358" y="182" font-size="18" font-weight="700">Seasonal check-in</text>
  <text class="muted" x="358" y="212" font-size="13">Helpful reminder</text>
  <text class="muted" x="358" y="236" font-size="13">Operator-approved</text>
  <rect x="358" y="268" width="184" height="40" rx="20" fill="rgba(255,255,255,0.08)" class="stroke" stroke-width="1" />
  <text class="ink" x="382" y="294" font-size="12" font-weight="700">One follow-up max</text>

  <rect x="590" y="90" width="240" height="330" rx="26" fill="rgba(255,255,255,0.04)" class="stroke" stroke-width="1" />
  <text class="accent" x="618" y="142" font-size="12" font-weight="700" letter-spacing="1.2">BOOKED</text>
  <text class="ink" x="618" y="182" font-size="18" font-weight="700">Schedule + track</text>
  <text class="muted" x="618" y="212" font-size="13">Stop on reply</text>
  <text class="muted" x="618" y="236" font-size="13">Won / close-lost</text>
  <rect x="618" y="268" width="184" height="40" rx="20" fill="rgba(255,255,255,0.08)" class="stroke" stroke-width="1" />
  <text class="ink" x="642" y="294" font-size="12" font-weight="700">Opt-out included</text>

  <path d="M310 255 H330" fill="none" stroke="rgba(255,255,255,0.24)" stroke-width="3" stroke-linecap="round"/>
  <path d="M570 255 H590" fill="none" stroke="rgba(255,255,255,0.24)" stroke-width="3" stroke-linecap="round"/>
</svg>

