  <path d="M352 328 H395" fill="none" stroke="rgba(255,255,255,0.26)" stroke-width="4" stroke-linecap="round" />
  <path d="M645 328 H688" fill="none" stroke="rgba(255,255,255,0.26)" stroke-width="4" stroke-linecap="round" />

  <rect x="72" y="476" width="896" height="162" rx="22" fill="rgba(255,255,255,0.04)" class="stroke" stroke-width="1" />
  <text class="accent" x="102" y="524" font-size="14" letter-spacing="1.4">GUARDRAILS</text>
  <text class="muted" x="102" y="552" font-size="13">Stop after 2 nudges • opt-out always • quiet hours • operator handoff on complaints</text>

  <rect x="102" y="576" width="520" height="38" rx="14" fill="rgba(255,255,255,0.05)" class="stroke" stroke-width="1" />
  <text class="muted" x="126" y="600" font-size="12">“Part arrived — want to lock in the install time?”</text>
