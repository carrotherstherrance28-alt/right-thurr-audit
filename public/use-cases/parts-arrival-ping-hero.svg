<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="680" viewBox="0 0 1040 680" role="img">
  <defs>
    <linearGradient id="papHeroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b0f" />
      <stop offset="1" stop-color="#2a5a42" />
    </linearGradient>
    <style>
      .ink { fill: rgba(255,255,255,0.92); font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
      .muted { fill: rgba(255,255,255,0.72); font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
      .stroke { stroke: rgba(255,255,255,0.14); }
      .accent { fill: rgba(108,246,168,0.92); font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
    </style>
  </defs>

  <rect x="0" y="0" width="1040" height="680" rx="26" fill="url(#papHeroBg)" />
  <rect x="34" y="30" width="972" height="620" rx="24" fill="rgba(255,255,255,0.03)" class="stroke" stroke-width="1" />

  <text class="muted" x="72" y="88" font-size="12" letter-spacing="1.2">USE CASE FLOW</text>
  <text class="ink" x="72" y="132" font-size="34" font-weight="700">Parts Arrival Ping</text>
  <text class="muted" x="72" y="162" font-size="14">Part ordered → arrival ping → schedule/confirm install (operator-controlled)</text>

  <rect x="72" y="208" width="896" height="230" rx="22" fill="rgba(255,255,255,0.04)" class="stroke" stroke-width="1" />

  <rect x="102" y="252" width="250" height="150" rx="20" fill="rgba(255,255,255,0.05)" class="stroke" stroke-width="1" />
  <text class="ink" x="130" y="298" font-size="14" font-weight="700">Part ordered</text>
  <text class="muted" x="130" y="324" font-size="12">Consent captured</text>
  <text class="muted" x="130" y="346" font-size="12">Status tracked</text>

  <rect x="395" y="252" width="250" height="150" rx="20" fill="rgba(255,255,255,0.05)" class="stroke" stroke-width="1" />
  <text class="ink" x="423" y="298" font-size="14" font-weight="700">Arrival ping</text>
  <text class="muted" x="423" y="324" font-size="12">No delivery promises</text>
  <text class="muted" x="423" y="346" font-size="12">One clear CTA</text>

  <rect x="688" y="252" width="250" height="150" rx="20" fill="rgba(255,255,255,0.05)" class="stroke" stroke-width="1" />
  <text class="ink" x="716" y="298" font-size="14" font-weight="700">Schedule</text>
  <text class="muted" x="716" y="324" font-size="12">Confirm time</text>
