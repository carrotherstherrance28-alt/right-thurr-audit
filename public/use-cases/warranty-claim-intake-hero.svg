<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" viewBox="0 0 1120 760" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1120" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0B0F" />
      <stop offset="1" stop-color="#101018" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#151522" />
      <stop offset="1" stop-color="#0F0F18" />
    </linearGradient>
  </defs>

  <rect width="1120" height="760" rx="28" fill="url(#bg)" />
  <rect x="52" y="78" width="1016" height="604" rx="22" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.10)" />

  <text
    x="92"
    y="152"
    fill="rgba(255,255,255,0.92)"
    font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto"
    font-size="24"
    font-weight="800"
  >
    Warranty Claim Intake
  </text>
  <text
    x="92"
    y="184"
    fill="rgba(255,255,255,0.70)"
    font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto"
    font-size="15"
  >
    Claim received → collect evidence → human review → schedule repair or close (operator-safe).
  </text>

  <g>
    <rect x="92" y="238" width="292" height="382" rx="18" fill="url(#panel)" stroke="rgba(255,255,255,0.10)" />
    <text
      x="122"
      y="290"
      fill="rgba(255,255,255,0.92)"
      font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto"
      font-size="16"
      font-weight="800"
    >
      1) Trigger
    </text>
    <text x="122" y="322" fill="rgba(255,255,255,0.70)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="14">
      “This should be covered.”
    </text>
    <text x="122" y="350" fill="rgba(255,255,255,0.70)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="14">
      Warranty email, form,
    </text>
    <text x="122" y="376" fill="rgba(255,255,255,0.70)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="14">
      call, or operator note.
    </text>
    <rect x="122" y="412" width="232" height="1" fill="rgba(255,255,255,0.10)" />
    <text x="122" y="444" fill="rgba(255,255,255,0.60)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="13">
      Acknowledge fast.
    </text>
    <text x="122" y="466" fill="rgba(255,255,255,0.60)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="13">
      No outcome promises.
    </text>
  </g>

  <g>
    <rect x="414" y="238" width="292" height="382" rx="18" fill="url(#panel)" stroke="rgba(255,255,255,0.10)" />
    <text
      x="444"
      y="290"
      fill="rgba(255,255,255,0.92)"
      font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto"
      font-size="16"
      font-weight="800"
    >
      2) Intake
    </text>
    <text x="444" y="322" fill="rgba(255,255,255,0.70)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="14">
      Collect minimum proof:
    </text>
    <text x="444" y="350" fill="rgba(255,255,255,0.70)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="14">
      • 1-line issue summary
    </text>
    <text x="444" y="376" fill="rgba(255,255,255,0.70)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="14">
      • photos/video (2–3)
    </text>
    <text x="444" y="402" fill="rgba(255,255,255,0.70)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="14">
      • receipt (if available)
    </text>
    <text x="444" y="428" fill="rgba(255,255,255,0.70)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="14">
      • access notes (gate/pets)
    </text>
    <rect x="444" y="462" width="232" height="1" fill="rgba(255,255,255,0.10)" />
    <text x="444" y="494" fill="rgba(255,255,255,0.60)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="13">
      Safety risk? escalate now.
    </text>
  </g>

  <g>
    <rect x="736" y="238" width="292" height="382" rx="18" fill="url(#panel)" stroke="rgba(255,255,255,0.10)" />
    <text
      x="766"
      y="290"
      fill="rgba(255,255,255,0.92)"
      font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto"
      font-size="16"
      font-weight="800"
    >
      3) Outcomes
    </text>
    <text x="766" y="322" fill="rgba(255,255,255,0.70)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="14">
      Human review decides:
    </text>
    <text x="766" y="350" fill="rgba(255,255,255,0.70)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="14">
      • schedule inspection/repair
    </text>
    <text x="766" y="376" fill="rgba(255,255,255,0.70)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="14">
      • request more info once
    </text>
    <text x="766" y="402" fill="rgba(255,255,255,0.70)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="14">
      • deny (reason template)
    </text>
    <text x="766" y="428" fill="rgba(255,255,255,0.70)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="14">
      • goodwill credit (optional)
    </text>
    <rect x="766" y="462" width="232" height="1" fill="rgba(255,255,255,0.10)" />
    <text x="766" y="494" fill="rgba(255,255,255,0.60)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="13">
      Stop on reply; one follow-up max.
    </text>
  </g>
</svg>

