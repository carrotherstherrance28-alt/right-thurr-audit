<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" viewBox="0 0 1120 760" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1120" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0B0F" />
      <stop offset="1" stop-color="#101018" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#151522" />
      <stop offset="1" stop-color="#0F0F18" />
    </linearGradient>
  </defs>

  <rect width="1120" height="760" rx="28" fill="url(#bg)" />
  <rect x="52" y="78" width="1016" height="604" rx="22" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.10)" />

  <text
    x="92"
    y="152"
    fill="rgba(255,255,255,0.92)"
    font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto"
    font-size="24"
    font-weight="800"
  >
    Change Order Approval
  </text>
  <text
    x="92"
    y="184"
    fill="rgba(255,255,255,0.70)"
    font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto"
    font-size="15"
  >
    Scope change signal → approval script → invoice update + schedule (operator-safe).
  </text>

  <g>
    <rect x="92" y="238" width="292" height="382" rx="18" fill="url(#panel)" stroke="rgba(255,255,255,0.10)" />
    <text
      x="122"
      y="290"
      fill="rgba(255,255,255,0.92)"
      font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto"
      font-size="16"
      font-weight="800"
    >
      1) Trigger
    </text>
    <text
      x="122"
      y="322"
      fill="rgba(255,255,255,0.70)"
      font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto"
      font-size="14"
    >
      “Can we add one more…”
    </text>
    <text
      x="122"
      y="350"
      fill="rgba(255,255,255,0.70)"
      font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto"
      font-size="14"
    >
      On-site surprise, text,
    </text>
    <text
      x="122"
      y="376"
      fill="rgba(255,255,255,0.70)"
      font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto"
      font-size="14"
    >
      call note, or scope creep.
    </text>
    <rect x="122" y="412" width="232" height="1" fill="rgba(255,255,255,0.10)" />
    <text x="122" y="444" fill="rgba(255,255,255,0.60)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="13">
      Capture “what changed”
    </text>
    <text x="122" y="468" fill="rgba(255,255,255,0.60)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="13">
      in 2 bullets + a photo.
    </text>
    <rect x="122" y="502" width="178" height="38" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.16)" />
    <text x="140" y="526" fill="rgba(255,255,255,0.80)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="12">
      Add note + photo
    </text>
  </g>

  <path d="M404 428 C 454 428, 454 428, 504 428" stroke="rgba(255,255,255,0.22)" stroke-width="3" fill="none" />
  <path d="M494 418 L504 428 L494 438" stroke="rgba(255,255,255,0.22)" stroke-width="3" fill="none" stroke-linecap="round" />

  <g>
    <rect x="514" y="238" width="292" height="382" rx="18" fill="url(#panel)" stroke="rgba(255,255,255,0.10)" />
    <text
      x="544"
      y="290"
      fill="rgba(255,255,255,0.92)"
      font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto"
      font-size="16"
      font-weight="800"
    >
      2) Approval Script
    </text>
    <text x="544" y="322" fill="rgba(255,255,255,0.70)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="14">
      Delta range + not-to-exceed
    </text>
    <text x="544" y="350" fill="rgba(255,255,255,0.70)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="14">
      (human approved), then 1 CTA.
    </text>
    <rect x="544" y="386" width="232" height="1" fill="rgba(255,255,255,0.10)" />
    <text x="544" y="418" fill="rgba(255,255,255,0.60)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="13">
      Never: “done deal”.
    </text>
    <text x="544" y="442" fill="rgba(255,255,255,0.60)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="13">
      Always: “we’ll confirm”.
    </text>
    <rect x="544" y="492" width="168" height="40" rx="12" fill="rgba(126, 231, 135, 0.14)" stroke="rgba(126, 231, 135, 0.34)" />
    <text x="560" y="518" fill="rgba(255,255,255,0.88)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="12">
      Approve + proceed
    </text>
    <rect x="724" y="492" width="152" height="40" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.16)" />
    <text x="740" y="518" fill="rgba(255,255,255,0.80)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="12">
      Decline / pause
    </text>
  </g>

  <path d="M826 428 C 876 428, 876 428, 926 428" stroke="rgba(255,255,255,0.22)" stroke-width="3" fill="none" />
  <path d="M916 418 L926 428 L916 438" stroke="rgba(255,255,255,0.22)" stroke-width="3" fill="none" stroke-linecap="round" />

  <g>
    <rect x="936" y="238" width="132" height="382" rx="18" fill="url(#panel)" stroke="rgba(255,255,255,0.10)" />
    <text
      x="956"
      y="290"
      fill="rgba(255,255,255,0.92)"
      font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto"
      font-size="16"
      font-weight="800"
    >
      3) Outcomes
    </text>
    <rect x="956" y="320" width="92" height="1" fill="rgba(255,255,255,0.10)" />
    <text x="956" y="350" fill="rgba(255,255,255,0.66)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="12">
      Approved →
    </text>
    <text x="956" y="372" fill="rgba(255,255,255,0.66)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="12">
      update invoice
    </text>
    <text x="956" y="394" fill="rgba(255,255,255,0.66)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="12">
      + proceed.
    </text>
    <text x="956" y="432" fill="rgba(255,255,255,0.55)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="12">
      Declined →
    </text>
    <text x="956" y="454" fill="rgba(255,255,255,0.55)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="12">
      rescope
    </text>
    <text x="956" y="476" fill="rgba(255,255,255,0.55)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="12">
      or pause.
    </text>
    <rect x="956" y="510" width="92" height="1" fill="rgba(255,255,255,0.10)" />
    <text x="956" y="540" fill="rgba(255,255,255,0.46)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="11">
      One follow-up max.
    </text>
  </g>
</svg>
