<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px 24px;background:var(--bg);}
  .row{display:flex;gap:14px;flex-wrap:wrap;}
  .swatch{display:flex;flex-direction:column;gap:6px;}
  .chip{width:120px;height:64px;border:3px solid var(--rt-ink-900);display:flex;align-items:center;justify-content:center;font-family:var(--font-subhead);font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--rt-paper-cold);font-size:11px;}
  .name{font-family:var(--font-subhead);font-weight:700;text-transform:uppercase;letter-spacing:.12em;font-size:10.5px;}
  .hex{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-muted);}
</style></head><body>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#4F7A3A">success</div><div class="name">Success · moss</div><div class="hex">#4F7A3A</div></div>
  <div class="swatch"><div class="chip" style="background:#E2A12B;color:#1A1714">warning</div><div class="name">Warning · mustard</div><div class="hex">#E2A12B</div></div>
  <div class="swatch"><div class="chip" style="background:#B33A2A">danger</div><div class="name">Danger · barn red</div><div class="hex">#B33A2A</div></div>
  <div class="swatch"><div class="chip" style="background:#2F5D6E">info</div><div class="name">Info · teal-slate</div><div class="hex">#2F5D6E</div></div>
</div>
</body></html>
