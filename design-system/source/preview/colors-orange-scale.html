<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px 24px;background:var(--bg);}
  .row{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;}
  .swatch{display:flex;flex-direction:column;gap:6px;}
  .chip{width:88px;height:64px;border:3px solid var(--rt-ink-900);}
  .name{font-family:var(--font-subhead);font-weight:700;text-transform:uppercase;letter-spacing:.12em;font-size:10.5px;color:var(--fg);}
  .hex{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-muted);}
</style></head><body>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#FCEFE6"></div><div class="name">Orange 50</div><div class="hex">#FCEFE6</div></div>
  <div class="swatch"><div class="chip" style="background:#F8DCC4"></div><div class="name">Orange 100</div><div class="hex">#F8DCC4</div></div>
  <div class="swatch"><div class="chip" style="background:#F1B68A"></div><div class="name">Orange 200</div><div class="hex">#F1B68A</div></div>
  <div class="swatch"><div class="chip" style="background:#EA8F50"></div><div class="name">Orange 300</div><div class="hex">#EA8F50</div></div>
  <div class="swatch"><div class="chip" style="background:#E2742B"></div><div class="name">Orange 400</div><div class="hex">#E2742B</div></div>
  <div class="swatch"><div class="chip" style="background:#D9621F;outline:2px solid var(--rt-orange-500);outline-offset:-3px;"></div><div class="name" style="color:var(--rt-orange-600)">★ Orange 500</div><div class="hex">#D9621F</div></div>
  <div class="swatch"><div class="chip" style="background:#B84F18"></div><div class="name">Orange 600</div><div class="hex">#B84F18</div></div>
  <div class="swatch"><div class="chip" style="background:#8E3C12"></div><div class="name" style="color:var(--rt-paper)">Orange 700</div><div class="hex">#8E3C12</div></div>
  <div class="swatch"><div class="chip" style="background:#5E280C"></div><div class="name" style="color:var(--rt-paper)">Orange 800</div><div class="hex">#5E280C</div></div>
</div>
</body></html>
