<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px 24px;background:var(--bg);font-family:var(--font-body);}
  .row{display:flex;align-items:baseline;gap:18px;padding:6px 0;border-bottom:1px solid var(--border-paper);}
  .row:last-child{border-bottom:0;}
  .label{width:80px;font-family:var(--font-mono);font-size:11px;color:var(--fg-muted);}
  .sample{flex:1;color:var(--fg);}
</style></head><body>
<div class="row"><div class="label">112 · 6xl</div><div class="sample" style="font-family:var(--font-display-ts);font-size:62px;line-height:1;letter-spacing:-.02em;">Ship today</div></div>
<div class="row"><div class="label">64 · 4xl</div><div class="sample" style="font-family:var(--font-display-ts);font-size:46px;line-height:1.05;">Build the system</div></div>
<div class="row"><div class="label">28 · xl</div><div class="sample" style="font-weight:800;letter-spacing:-.02em;">Activity feed is live</div></div>
<div class="row"><div class="label">16 · base</div><div class="sample">Body — your system is running.</div></div>
<div class="row"><div class="label">12 · xs</div><div class="sample" style="font-family:var(--font-subhead);text-transform:uppercase;letter-spacing:.14em;font-weight:700;color:var(--fg-muted);">Eyebrow · case study</div></div>
</body></html>
