<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);font-family:var(--font-body);display:flex;gap:28px;align-items:center;flex-wrap:wrap;}
  img{display:block;}
  .col{display:flex;flex-direction:column;gap:6px;align-items:center;}
  .name{font-family:var(--font-subhead);text-transform:uppercase;letter-spacing:.14em;font-weight:700;font-size:10.5px;color:var(--fg-muted);}
  .on-blue{background:#4548B8;}
  .on-blue .name{color:var(--rt-paper-cold);}
</style></head><body>
<div class="col"><img src="../assets/right-thurr-wordmark-clean.png" height="120" alt="Right Thurr primary logo"/><div class="name">Primary · Right Thurr</div></div>
<div class="col"><img src="../assets/rt-monogram-clean.png" height="120" alt="R+T monogram"/><div class="name">Monogram · shared</div></div>
<div class="col on-blue" style="padding:18px 22px;border:3px solid var(--rt-ink-900);"><img src="../assets/right-thurr-wordmark-clean.png" height="80" alt="wordmark on royal blue"/><div class="name">On royal blue · poster</div></div>
<div class="col on-blue" style="padding:18px 22px;border:3px solid var(--rt-ink-900);"><img src="../assets/rt-monogram-clean.png" height="80" alt="monogram on royal blue"/><div class="name">Monogram · royal blue</div></div>
</body></html>
