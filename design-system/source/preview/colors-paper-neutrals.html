<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px 24px;background:#888;}
  .row{display:flex;gap:18px;align-items:flex-end;flex-wrap:wrap;}
  .swatch{display:flex;flex-direction:column;gap:6px;}
  .chip{width:120px;height:74px;border:3px solid var(--rt-ink-900);}
  .name{font-family:var(--font-subhead);font-weight:700;text-transform:uppercase;letter-spacing:.12em;font-size:11px;color:#fff;}
  .hex{font-family:var(--font-mono);font-size:10.5px;color:#ddd;}
</style></head><body>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#F5EFE2"></div><div class="name">Paper ★</div><div class="hex">#F5EFE2 · canvas</div></div>
  <div class="swatch"><div class="chip" style="background:#FAF7EE"></div><div class="name">Paper Cold</div><div class="hex">#FAF7EE · raised</div></div>
  <div class="swatch"><div class="chip" style="background:#EFE5D2"></div><div class="name">Paper Warm</div><div class="hex">#EFE5D2</div></div>
  <div class="swatch"><div class="chip" style="background:#E5D9C0"></div><div class="name">Paper Deep</div><div class="hex">#E5D9C0 · sunken</div></div>
  <div class="swatch"><div class="chip" style="background:#FFFFFF"></div><div class="name">Pure White</div><div class="hex">#FFFFFF · logo only</div></div>
  <div class="swatch"><div class="chip" style="background:#000000"></div><div class="name">Pure Black</div><div class="hex">#000000 · logo only</div></div>
</div>
</body></html>
