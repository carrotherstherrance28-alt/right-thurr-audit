<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);font-family:var(--font-body);}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
  .btn-ts{font-family:var(--font-body);font-weight:700;font-size:14px;padding:12px 20px;background:var(--rt-orange-500);color:#fff;border:none;border-radius:8px;cursor:pointer;transition:background 120ms ease-out;}
  .btn-ts:hover{background:var(--rt-orange-600);}
  .btn-ts.secondary{background:#fff;color:var(--rt-ink-900);border:1.5px solid var(--rt-ink-900);}
  .btn-ts.secondary:hover{background:var(--rt-ink-900);color:#fff;}
  .btn-ts.ghost{background:transparent;color:var(--rt-ink-900);border:0;font-weight:600;}
  .btn-ts.ghost:hover{color:var(--rt-orange-500);}
  .arrow{display:inline-block;margin-left:6px;}
  .label{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-muted);width:100%;margin-top:8px;}
</style></head><body>
<div class="row">
  <button class="btn-ts">Book a call <span class="arrow">→</span></button>
  <button class="btn-ts secondary">View case studies</button>
  <button class="btn-ts ghost">Read more →</button>
</div>
<div class="label">Thurr Solutions · 8px radius · sentence case Archivo · darken on hover · no transform</div>
</body></html>
