<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px 26px 30px;background:var(--bg);font-family:var(--font-body);}
  .row{display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start;}
  .card-rt{background:var(--rt-paper-cold);border:4px solid var(--rt-ink-900);border-radius:0;padding:18px 20px;width:240px;box-shadow:6px 6px 0 0 var(--rt-ink-900);}
  .card-ts{background:#fff;border:1px solid var(--rt-ink-200);border-radius:12px;padding:20px 22px;width:240px;box-shadow:0 2px 0 var(--rt-ink-200), 0 6px 18px rgba(26,23,20,.10);}
  .eyebrow{font-family:var(--font-subhead);text-transform:uppercase;letter-spacing:.14em;font-weight:700;font-size:10.5px;color:var(--fg-muted);margin-bottom:6px;}
  .h{font-family:var(--font-display-ts);font-size:22px;line-height:1.05;letter-spacing:-.01em;margin:0 0 6px;color:var(--fg);}
  .p{font-size:13px;color:var(--fg-muted);margin:0;}
  .label{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-muted);margin-top:10px;}
</style></head><body>
<div class="row">
  <div>
    <div class="card-rt">
      <div class="eyebrow">Thurr Solutions</div>
      <h3 class="h">Blueprint generated</h3>
      <p class="p">Lawn-care offer at $89/visit. 4 tasks queued.</p>
    </div>
    <div class="label">4px ink border · 0 radius · stamp shadow</div>
  </div>
  <div>
    <div class="card-ts">
      <div class="eyebrow">Thurr Solutions</div>
      <h3 class="h">Automation audit</h3>
      <p class="p">Custom workflow review with measurable ROI baseline.</p>
    </div>
    <div class="label">1px hairline · 12 radius · paper shadow</div>
  </div>
</div>
</body></html>
