<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);font-family:var(--font-body);}
  .row{display:flex;gap:18px;flex-wrap:wrap;align-items:center;}
  .btn-rt{font-family:var(--font-subhead);font-weight:700;text-transform:uppercase;letter-spacing:.14em;font-size:13px;padding:14px 22px;background:var(--rt-orange-500);color:var(--rt-paper-cold);border:3px solid var(--rt-ink-900);border-radius:4px;box-shadow:6px 6px 0 0 var(--rt-ink-900);cursor:pointer;transition:transform 120ms cubic-bezier(.2,.9,.3,1.2),box-shadow 120ms cubic-bezier(.2,.9,.3,1.2);}
  .btn-rt:hover{transform:translate(-2px,-2px);box-shadow:8px 8px 0 0 var(--rt-ink-900);}
  .btn-rt:active{transform:translate(0,0);box-shadow:0 0 0 0 var(--rt-ink-900);transition-duration:60ms;}
  .btn-rt.secondary{background:var(--rt-paper-cold);color:var(--rt-ink-900);}
  .btn-rt.ghost{background:transparent;box-shadow:none;border-color:var(--rt-ink-900);color:var(--rt-ink-900);}
  .btn-rt.ghost:hover{background:var(--rt-ink-900);color:var(--rt-paper-cold);}
  .label{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-muted);width:100%;margin-top:6px;}
</style></head><body>
<div class="row">
  <button class="btn-rt">START THE SYSTEM →</button>
  <button class="btn-rt secondary">SEE A DEMO</button>
  <button class="btn-rt ghost">SKIP</button>
</div>
<div class="label">Right Thurr · 3px ink border · 6px stamp shadow · UPPERCASE Archivo Narrow · lifts on hover, presses flat</div>
</body></html>
