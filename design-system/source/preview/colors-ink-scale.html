<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px 24px;background:var(--bg);}
  .row{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;}
  .swatch{display:flex;flex-direction:column;gap:6px;}
  .chip{width:80px;height:64px;border:3px solid var(--rt-ink-900);}
  .name{font-family:var(--font-subhead);font-weight:700;text-transform:uppercase;letter-spacing:.12em;font-size:10.5px;}
  .hex{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-muted);}
</style></head><body>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#1A1714"></div><div class="name">Ink 900 ★</div><div class="hex">#1A1714</div></div>
  <div class="swatch"><div class="chip" style="background:#2A2520"></div><div class="name">Ink 800</div><div class="hex">#2A2520</div></div>
  <div class="swatch"><div class="chip" style="background:#3D3630"></div><div class="name">Ink 700</div><div class="hex">#3D3630</div></div>
  <div class="swatch"><div class="chip" style="background:#574E45"></div><div class="name">Ink 600</div><div class="hex">#574E45</div></div>
  <div class="swatch"><div class="chip" style="background:#7A6E62"></div><div class="name">Ink 500</div><div class="hex">#7A6E62</div></div>
  <div class="swatch"><div class="chip" style="background:#A89A8B"></div><div class="name">Ink 400</div><div class="hex">#A89A8B</div></div>
  <div class="swatch"><div class="chip" style="background:#CFC3B4"></div><div class="name">Ink 300</div><div class="hex">#CFC3B4</div></div>
  <div class="swatch"><div class="chip" style="background:#E5DCCD"></div><div class="name">Ink 200</div><div class="hex">#E5DCCD</div></div>
  <div class="swatch"><div class="chip" style="background:#EFE7D9"></div><div class="name">Ink 100</div><div class="hex">#EFE7D9</div></div>
</div>
</body></html>
