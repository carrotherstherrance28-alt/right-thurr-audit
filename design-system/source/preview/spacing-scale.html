<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px 24px;background:var(--bg);font-family:var(--font-body);}
  .row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .swatch{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .box{background:var(--rt-orange-500);border:2px solid var(--rt-ink-900);}
  .name{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-muted);}
</style></head><body>
<div class="row">
  <div class="swatch"><div class="box" style="width:4px;height:4px;"></div><div class="name">1 · 4px</div></div>
  <div class="swatch"><div class="box" style="width:8px;height:8px;"></div><div class="name">2 · 8px</div></div>
  <div class="swatch"><div class="box" style="width:12px;height:12px;"></div><div class="name">3 · 12</div></div>
  <div class="swatch"><div class="box" style="width:16px;height:16px;"></div><div class="name">4 · 16</div></div>
  <div class="swatch"><div class="box" style="width:24px;height:24px;"></div><div class="name">6 · 24</div></div>
  <div class="swatch"><div class="box" style="width:32px;height:32px;"></div><div class="name">8 · 32</div></div>
  <div class="swatch"><div class="box" style="width:48px;height:48px;"></div><div class="name">12 · 48</div></div>
  <div class="swatch"><div class="box" style="width:64px;height:64px;"></div><div class="name">16 · 64</div></div>
  <div class="swatch"><div class="box" style="width:96px;height:96px;"></div><div class="name">24 · 96</div></div>
</div>
</body></html>
