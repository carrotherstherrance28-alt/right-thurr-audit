<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);font-family:var(--font-body);}
  .row{display:flex;gap:24px;align-items:flex-end;flex-wrap:wrap;}
  .box{width:88px;height:60px;background:var(--rt-paper-cold);border:3px solid var(--rt-ink-900);}
  .swatch{display:flex;flex-direction:column;gap:6px;align-items:center;}
  .name{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-muted);}
</style></head><body>
<div class="row">
  <div class="swatch"><div class="box" style="border-radius:0"></div><div class="name">none · 0px · RT cards</div></div>
  <div class="swatch"><div class="box" style="border-radius:2px"></div><div class="name">xs · 2</div></div>
  <div class="swatch"><div class="box" style="border-radius:4px"></div><div class="name">sm · 4 · RT btn</div></div>
  <div class="swatch"><div class="box" style="border-radius:8px"></div><div class="name">md · 8 · TS btn</div></div>
  <div class="swatch"><div class="box" style="border-radius:12px"></div><div class="name">lg · 12 · TS card</div></div>
  <div class="swatch"><div class="box" style="border-radius:18px"></div><div class="name">xl · 18</div></div>
  <div class="swatch"><div class="box" style="border-radius:999px;width:120px"></div><div class="name">pill · chips only</div></div>
</div>
</body></html>
