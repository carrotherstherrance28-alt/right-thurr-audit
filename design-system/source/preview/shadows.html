<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:30px 28px 38px;background:var(--bg);font-family:var(--font-body);}
  .row{display:flex;gap:36px;flex-wrap:wrap;}
  .swatch{display:flex;flex-direction:column;gap:14px;align-items:flex-start;}
  .box{width:120px;height:72px;background:var(--rt-paper-cold);border:3px solid var(--rt-ink-900);}
  .soft{border:1px solid var(--rt-ink-200);background:#fff;border-radius:12px;}
  .name{font-family:var(--font-subhead);font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg);}
  .desc{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);}
</style></head><body>
<div class="row">
  <div class="swatch"><div class="box" style="box-shadow:3px 3px 0 0 var(--rt-ink-900)"></div><div><div class="name">Stamp · sm</div><div class="desc">3 3 0 ink</div></div></div>
  <div class="swatch"><div class="box" style="box-shadow:6px 6px 0 0 var(--rt-ink-900)"></div><div><div class="name">Stamp · default ★</div><div class="desc">6 6 0 ink · RT cards</div></div></div>
  <div class="swatch"><div class="box" style="box-shadow:10px 10px 0 0 var(--rt-ink-900)"></div><div><div class="name">Stamp · lg</div><div class="desc">10 10 0 ink · posters</div></div></div>
  <div class="swatch"><div class="box soft" style="box-shadow:0 1px 0 var(--rt-ink-200), 0 2px 6px rgba(26,23,20,.06)"></div><div><div class="name">Paper · sm</div><div class="desc">TS cards subtle</div></div></div>
  <div class="swatch"><div class="box soft" style="box-shadow:0 2px 0 var(--rt-ink-200), 0 6px 18px rgba(26,23,20,.10)"></div><div><div class="name">Paper · default ★</div><div class="desc">TS cards default</div></div></div>
</div>
</body></html>
